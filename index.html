<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <h1>🎧 Smart Music Player</h1>

    <!-- Search -->
    <input type="text" id="search" placeholder="Search songs...">

    <!-- Playlist -->
    <div id="playlist"></div>

    <!-- Player -->
    <div class="player">
      <img id="cover" src="" alt="cover">
      <h2 id="title">Select a Song</h2>

      <audio id="audio"></audio>

      <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="playSong()">▶</button>
        <button onclick="pauseSong()">⏸</button>
        <button onclick="nextSong()">⏭</button>
      </div>

      <input type="range" id="progress" value="0">
      <input type="range" id="volume" min="0" max="1" step="0.1">
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
